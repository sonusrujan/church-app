version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shalom
      POSTGRES_USER: shalom_admin
      POSTGRES_PASSWORD: localdev123
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/aws_rds_full_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shalom_admin -d shalom']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npx ts-node-dev --respawn --transpile-only src/index.ts"
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./tsconfig.json:/app/tsconfig.json
      - backend_modules:/app/node_modules
    ports:
      - '4000:4000'
    environment:
      PORT: 4000
      NODE_ENV: development
      DATABASE_URL: postgresql://shalom_admin:localdev123@db:5432/shalom
      DB_SSL: 'false'
      JWT_SECRET: local-dev-jwt-secret-change-in-production
      OTP_EXPIRY_MINUTES: 10
      FRONTEND_URL: http://localhost:5173
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npx vite --host 0.0.0.0"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/eslint.config.js:/app/eslint.config.js
      - frontend_modules:/app/node_modules
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:4000

volumes:
  pgdata:
  backend_modules:
  frontend_modules:
