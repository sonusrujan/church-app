  <body>
    <div id="root"></div>
    <noscript>
      <h1>Shalom – Church Management App</h1>
      <p>Shalom is an all-in-one church management and member engagement platform. Manage members, donations, subscriptions, events, prayer requests, and announcements — all in one place.</p>
      <h2>For Members</h2>
      <ul>
        <li>Connect with church leadership and pastors</li>
        <li>Make donations and track payment history</li>
        <li>Submit and track prayer requests</li>
        <li>Stay updated with events and announcements</li>
        <li>Manage family member profiles</li>
      </ul>
      <h2>For Churches</h2>
      <ul>
        <li>Digital presence for your church community</li>
        <li>Member management with detailed profiles</li>
        <li>Subscription and donation tracking with Razorpay</li>
        <li>Event management and push notifications</li>
        <li>Financial reports and receipt generation</li>
      </ul>
      <p><a href="https://shalomapp.in/explore">Find your church on Shalom</a></p>
      <p><a href="https://shalomapp.in/privacy">Privacy Policy</a> | <a href="https://shalomapp.in/terms">Terms &amp; Conditions</a></p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").then(function(reg) {
            reg.addEventListener("updatefound", function() {
              var newWorker = reg.installing;
              if (newWorker) {
                newWorker.addEventListener("statechange", function() {
                  if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                    // New version available — show update banner
                    var banner = document.createElement("div");
                    banner.id = "sw-update-banner";
                    banner.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#4f46e5;color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-family:system-ui,sans-serif;font-size:14px;";
                    banner.innerHTML = '<span>A new version is available.</span><button onclick="document.getElementById(\'sw-update-banner\').remove();navigator.serviceWorker.controller && navigator.serviceWorker.ready.then(function(r){r.waiting && r.waiting.postMessage({type:\'SKIP_WAITING\'})});location.reload();" style="background:white;color:#4f46e5;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-weight:600;">Update</button>';
                    document.body.appendChild(banner);
                  }
                });
              }
            });
          }).catch(function() {});
        });
      }
    </script>
  </body>
