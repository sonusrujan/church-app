<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2E2A5A" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Shalom</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").then(function(reg) {
            reg.addEventListener("updatefound", function() {
              var newWorker = reg.installing;
              if (newWorker) {
                newWorker.addEventListener("statechange", function() {
                  if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                    // New version available — show update banner
                    var banner = document.createElement("div");
                    banner.id = "sw-update-banner";
                    banner.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#4f46e5;color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:9999;font-family:system-ui,sans-serif;font-size:14px;";
                    banner.innerHTML = '<span>A new version is available.</span><button onclick="document.getElementById(\'sw-update-banner\').remove();navigator.serviceWorker.controller && navigator.serviceWorker.ready.then(function(r){r.waiting && r.waiting.postMessage({type:\'SKIP_WAITING\'})});location.reload();" style="background:white;color:#4f46e5;border:none;padding:6px 16px;border-radius:6px;cursor:pointer;font-weight:600;">Update</button>';
                    document.body.appendChild(banner);
                  }
                });
              }
            });
          }).catch(function() {});
        });
      }
    </script>
  </body>
</html>
